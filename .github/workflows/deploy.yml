name: Deploy Mongcook Analytics

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and deploy with Docker Compose
        run: |
          docker compose down
          docker compose build --no-cache
          docker compose up -d

      - name: Verify deployment
        run: |
          echo "Waiting for container to start..."
          sleep 5
          docker compose ps
          curl -sf http://localhost:3000/api/health || echo "Health check pending (container may still be starting)"

      - name: Cleanup old images
        run: docker image prune -f
