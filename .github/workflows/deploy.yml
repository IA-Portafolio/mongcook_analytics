name: Deploy Mongcook Analytics

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          APP_URL=${{ secrets.APP_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          TOTEAT_XIR=${{ secrets.TOTEAT_XIR }}
          TOTEAT_XIL=${{ secrets.TOTEAT_XIL }}
          TOTEAT_XIU=${{ secrets.TOTEAT_XIU }}
          TOTEAT_API_TOKEN=${{ secrets.TOTEAT_API_TOKEN }}
          EOF

      - name: Build and deploy with Docker Compose
        run: |
          docker compose down
          docker compose build --no-cache
          docker compose up -d

      - name: Verify deployment
        run: |
          echo "Waiting for container health..."
          for i in {1..18}; do
            STATUS=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' mongcook-app 2>/dev/null || echo "missing")
            RESTARTS=$(docker inspect -f '{{.RestartCount}}' mongcook-app 2>/dev/null || echo "0")
            echo "Attempt $i: status=$STATUS restarts=$RESTARTS"
            if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "running" ]; then
              break
            fi
            if [ "$STATUS" = "unhealthy" ] || [ "$STATUS" = "exited" ] || [ "$STATUS" = "dead" ] || [ "$STATUS" = "missing" ]; then
              echo "Container failed to start"
              docker logs --tail 200 mongcook-app || true
              exit 1
            fi
            sleep 5
          done

          docker compose ps
          docker logs --tail 50 mongcook-app || true
          curl -fsS https://moongcook.iaportafolio.com/api/health
          curl -fsSI https://moongcook.iaportafolio.com/

      - name: Cleanup old images
        run: docker image prune -f
