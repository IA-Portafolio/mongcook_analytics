name: Deploy Mongcook Analytics

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          APP_URL=${{ secrets.APP_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          TOTEAT_XIR=${{ secrets.TOTEAT_XIR }}
          TOTEAT_XIL=${{ secrets.TOTEAT_XIL }}
          TOTEAT_XIU=${{ secrets.TOTEAT_XIU }}
          TOTEAT_API_TOKEN=${{ secrets.TOTEAT_API_TOKEN }}
          EOF

      - name: Build and deploy with Docker Compose
        run: |
          docker compose down
          docker compose build --no-cache
          docker compose up -d

      - name: Verify deployment
        run: |
          echo "Waiting for container to start..."
          sleep 5
          docker compose ps
          curl -sf http://localhost:3000/api/health || echo "Health check pending (container may still be starting)"

      - name: Cleanup old images
        run: docker image prune -f
